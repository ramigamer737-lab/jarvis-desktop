name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Lint — ruff check + format
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check (errors, warnings, imports)
        run: ruff check . --select E,W,F,I --ignore E501

      - name: ruff format check
        run: ruff format --check .

  # ─────────────────────────────────────────────────────────────
  # Job 2: Test — pytest with asyncio + httpx
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install pytest extras
        run: pip install pytest pytest-asyncio httpx pytest-timeout

      - name: Run tests
        continue-on-error: true
        run: pytest tests/ -v --tb=short --timeout=30
        env:
          JARVIS_LLM_PROVIDER: mock
          JARVIS_DRY_RUN: "1"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .pytest_cache/
            test-results.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 3: Build Electron — matrix: Windows / macOS / Linux
  # ─────────────────────────────────────────────────────────────
  build-electron:
    name: Build Electron (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build:win
            artifact_name: electron-dist-windows
          - os: macos-latest
            build_cmd: npm run build:mac
            artifact_name: electron-dist-macos
          - os: ubuntu-latest
            build_cmd: npm run build:linux
            artifact_name: electron-dist-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: electron/package-lock.json

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      # Linux: install required native libs for Electron
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            rpm \
            fakeroot

      - name: Build Electron app
        working-directory: electron
        run: ${{ matrix.build_cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          SKIP_NOTARIZE: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: electron/dist/
          retention-days: 14
          if-no-files-found: warn
